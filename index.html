<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Spill the Tea</title>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,700;1,700&family=DM+Sans:wght@300;400&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- HOME -->
  <div id="screen-home" class="screen active">
    <div class="home-wrap">
      <div class="title-block">
        <h1 class="title">Spill<br>the Tea</h1>
        <p class="tagline">pick your poison</p>
      </div>

      <div class="decks-wrap">
        <!-- SWEET DECK -->
        <div class="deck-stack" id="deck-sweet" onclick="startGame('sweet')">
          <div class="deck-card dc-back dc-back3"></div>
          <div class="deck-card dc-back dc-back2"></div>
          <div class="deck-card dc-back dc-back1"></div>
          <div class="deck-card dc-front sweet-front">
            <div class="front-inner">
              <span class="deck-tag">01</span>
              <span class="deck-title">Sweet</span>
              <span class="deck-sub">Deep questions.<br>Real conversations.</span>
              <span class="deck-cta">tap to play →</span>
            </div>
          </div>
        </div>

        <!-- SAUCY DECK -->
        <div class="deck-stack" id="deck-saucy" onclick="startGame('saucy')">
          <div class="deck-card dc-back dc-back3 saucy-back"></div>
          <div class="deck-card dc-back dc-back2 saucy-back"></div>
          <div class="deck-card dc-back dc-back1 saucy-back"></div>
          <div class="deck-card dc-front saucy-front">
            <div class="front-inner">
              <span class="deck-tag">02</span>
              <span class="deck-title">Saucy</span>
              <span class="deck-sub">Bolder. Spicier.<br>No filter.</span>
              <span class="deck-cta">tap to play →</span>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- GAME -->
  <div id="screen-game" class="screen">
    <div class="game-top">
      <button class="back-btn" onclick="goHome()">← back</button>
      <span id="card-counter" class="counter"></span>
    </div>

    <div class="game-body">
      <div class="q-stack">
        <div class="q-ghost q-ghost2"></div>
        <div class="q-ghost q-ghost1"></div>
        <div class="q-card" id="q-card" onclick="nextCard()">
          <span class="q-mode" id="q-mode"></span>
          <p class="q-text" id="q-text"></p>
          <span class="q-hint">tap for next</span>
        </div>
      </div>
    </div>

    <div class="prog-wrap"><div class="prog-bar" id="prog-bar"></div></div>
  </div>

  <!-- END -->
  <div id="screen-end" class="screen">
    <div class="end-wrap">
      <h2 class="end-title">That’s all<br>the tea.</h2>
      <p class="end-sub">hope it was a night to remember ✶</p>
      <button class="play-again" onclick="goHome()">Play again</button>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
