<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Spill the Tea</title>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,700;1,400;1,700&family=DM+Sans:wght@300;400&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- JS cursor overlay (follows mouse + touch) -->
  <div id="custom-cursor"></div>

  <!-- ── WELCOME ── -->
  <div id="screen-welcome" class="screen active">
    <div class="welcome-inner">

      <!-- Speech bubbles -->
      <img class="deco w-noway"  src="Pixel no way.png" alt="">
      <img class="deco w-drop"   src="Pixel drops.png"  alt="">
      <img class="deco w-emoji"  src="Strawberry emoji.png" alt="">

      <!-- Sugar cubes – bottom right -->
      <img class="deco w-sugar"  src="Sugar.png" alt="">

      <!-- Centered title -->
      <h1 class="splash-title">Spill the<br>Tea</h1>

      <!-- Cup + CTA -->
      <div class="cup-wrap">
        <button class="play-cup-btn" onclick="goToDecks()">play the game</button>
        <img class="cup-img" src="Cup.png" alt="teacup">
      </div>

    </div>
  </div>

  <!-- ── DECK SELECTION ── -->
  <div id="screen-home" class="screen">

    <div class="home-top">
      <button class="back-btn" onclick="goWelcome()">← back</button>
    </div>

    <div class="home-content">
      <div class="decks-wrap">
        <button class="deck-btn sweet-btn" onclick="startGame('sweet')">
          <img class="deck-card-img" src="Honeypot.png" alt="Honeypot">
        </button>
        <button class="deck-btn saucy-btn" onclick="startGame('saucy')">
          <img class="deck-card-img" src="Dirty chai.png" alt="Dirty Chai">
        </button>
      </div>
    </div>
  </div>

  <!-- ── GAME ── -->
  <div id="screen-game" class="screen">
    <div class="game-top">
      <button class="back-btn" onclick="goHome()">← back</button>
      <span id="card-counter" class="counter"></span>
    </div>

    <div class="game-body">
      <div class="q-stack" id="q-stack">
        <div class="q-ghost q-ghost2"></div>
        <div class="q-ghost q-ghost1"></div>
        <div class="q-card" id="q-card" onclick="nextCard()">
          <span class="q-mode" id="q-mode"></span>
          <p class="q-tagline" id="q-tagline"></p>
          <p class="q-text" id="q-text"></p>
          <div class="card-actions">
            <button class="done-btn" onclick="markDone(event)">✓ done</button>
            <div class="nav-btns">
              <button class="nav-btn" onclick="event.stopPropagation(); prevCard()">←</button>
              <button class="nav-btn" onclick="event.stopPropagation(); nextCard()">→</button>
            </div>
          </div>
        </div>
      </div>
    </div>

    <div class="prog-wrap"><div class="prog-bar" id="prog-bar"></div></div>
  </div>

  <!-- ── END ── -->
  <div id="screen-end" class="screen">
    <div class="end-wrap">
      <h2 class="end-title">That's all<br>the tea.</h2>
      <p class="end-sub">hope it was a night to remember ✦</p>
      <button class="play-again" onclick="goHome()">Play again</button>
      <button class="new-session-btn" onclick="newSession()">New session</button>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
